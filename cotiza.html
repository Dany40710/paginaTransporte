<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calucula Viaje</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>


<body>

     <header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Inicio</a>
      </div>
    </nav>
  </header>

      <!-- resto del contenido -->
  <main class="container py-4">
    <div class="modal d-block position-static" tabindex="-1" aria-labelledby="cotizaDialogTitle" aria-modal="true" role="dialog">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header justify-content-center">
            <h1 class="modal-title fs-5 text-center w-100" id="cotizaDialogTitle">Cotiza tu viaje</h1>
          </div>

          <div class="modal-body">
            <div class="Distancia mb-4">
                <div class="d-flex justify-content-between gap-2 flex-wrap">
                  <div class="input-group-text rounded-3">
                        <input class="form-check-input mt-0" type="radio" name="zonaDistancia" value="15" aria-label="Radio button for following text input">    
                        Ciudad de Mexico
                    </div>
                    
                  <div class="input-group-text rounded-3">
                        <input class="form-check-input mt-0" type="radio" name="zonaDistancia" value="20" aria-label="Radio button for following text input">    
                        Estados de Mexico
                    </div>
                </div>

                <input type="number" step="0.1" placeholder="Ingresa kilómetros" min="0" id="distanciaKilometros" class="form-control mt-3">
            </div>
            
            <div class="Equipaje mb-4">
                <h4>Equipaje</h4>

                <label for="equipajeChico" class="form-label">Chico</label>
                <select id="equipajeChico" class="form-select" aria-label="Default select example">
                <option selected>0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                </select>

                <label for="equipajeGrande" class="form-label mt-3">Grande</label>
                <select id="equipajeGrande" class="form-select" aria-label="Default select example">
                <option selected>0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
            </select>

            </div>
            
          <div class="Extras mb-4">

            <!-- Salida de terminal y zona-->
            <div class="d-flex justify-content-between gap-2 flex-wrap">
              <div class="input-group-text rounded-3">
                    <input 
                        class="form-check-input mt-0"
                        type="checkbox"
                        id="activarZona">
                     Zona 
                </div>

              <div class="input-group-text rounded-3">
                    <input 
                        class="form-check-input mt-0"
                        type="checkbox"
                        id="salidaTerminal">
                     Salida de terminal
                </div>
                
            </div>

            

            <!-- Select oculto al inicio -->
            <select 
                id="zonaUtilidad" 
                class="form-select mt-2" 
                style="display:none;">
                <option value="0.03">1</option>
                <option value="0.05">2</option>
                <option value="0.10">3</option>
            </select>

        </div>

        <div class="Resultado"> 
        <button id="btnCalcular" class="btn btn-primary mt-3 w-100">Calcular</button>
            <div id="resultadoTexto" class="d-none">
              <h4 class="mt-3">Resultado</h4>
              <p>El costo del viaje es: <strong id="costoTotal">$ </strong></p>
            </div>
        </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="cotiza.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
